<div class="relative w-full max-w-full" #containerRef>
  <button
    type="button"
    (click)="toggle()"
    [disabled]="disabled"
    class="flex h-11 w-full items-center gap-2 rounded-xl border bg-white px-4 text-sm transition focus:outline-none disabled:cursor-not-allowed disabled:opacity-60"
    [ngClass]="isOpen ? 'border-brand-500 ring-1 ring-brand-500/20' : 'border-slate-200'"
  >
    @if (selectedOption?.iconSvg) {
      <span [innerHTML]="html(selectedOption?.iconSvg || '')"></span>
    }
    <span
      class="flex-1 text-left font-medium truncate"
      [ngClass]="value ? 'text-slate-700' : 'text-slate-400'"
    >
      {{ selectedOption?.label || placeholder }}
    </span>
    <svg class="w-4 h-4 text-slate-400 transition-transform shrink-0" [ngClass]="{ 'rotate-180': isOpen }" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
  </button>

  @if (isOpen) {
    <div
      class="absolute left-0 top-full z-50 mt-2 rounded-xl border border-slate-200 bg-white p-3 shadow-lg max-w-[calc(100vw-2rem)] sm:max-w-none"
      [ngClass]="panelWidth === 'wide' ? 'w-80' : 'w-full'"
      (click)="$event.stopPropagation()"
    >
      @if (showSearch) {
        <div class="mb-2 flex items-center gap-2 rounded-lg border border-slate-200 px-3 py-2">
          <svg class="w-4 h-4 text-slate-400 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input
            #searchInput
            type="text"
            [ngModel]="searchTerm"
            (ngModelChange)="onSearch($event)"
            placeholder="Search..."
            class="w-full bg-transparent text-sm outline-none placeholder:text-slate-400"
          />
        </div>
      }

      <div class="flex max-h-80 flex-col gap-1 overflow-y-auto">
        @for (opt of filteredOptions; track opt.value) {
          <button
            type="button"
            (click)="select(opt)"
            class="flex w-full items-start gap-3 rounded-lg px-2 py-2 text-left hover:bg-slate-50"
            [ngClass]="opt.value === value ? 'bg-slate-50' : ''"
          >
            @if (opt.iconBg) {
              <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full" [style.background]="opt.iconBg" [innerHTML]="html(opt.iconSvg || '')"></span>
            } @else if (opt.iconSvg) {
              <span class="flex h-8 w-8 shrink-0 items-center justify-center" [innerHTML]="html(opt.iconSvg)"></span>
            }
            <span class="min-w-0 flex-1">
              <span class="block text-sm font-semibold text-slate-900">{{ opt.label }}</span>
              @if (opt.description) {
                <span class="mt-0.5 block text-xs leading-relaxed text-slate-500">{{ opt.description }}</span>
              }
            </span>
            @if (opt.value === value) {
              <span class="mt-1 text-brand-600" [innerHTML]="html(checkSvg)"></span>
            }
          </button>
        }
        @if (filteredOptions.length === 0) {
          <p class="px-2 py-3 text-center text-xs text-slate-400">No options found.</p>
        }
      </div>

      @if (allowAddNew) {
        <div class="mt-1 border-t border-slate-100 pt-2">
          <button
            type="button"
            (click)="onAddNew()"
            class="flex w-full items-center gap-1.5 rounded-lg px-2 py-2 text-sm font-semibold text-brand-600 hover:bg-slate-50"
          >
            <svg class="w-4 h-4 text-brand-600 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            {{ addNewLabel }}
          </button>
        </div>
      }
    </div>
  }
</div>
