<div class="rounded-xl border p-3 sm:p-4" [ngClass]="variantClasses.container">
  <div class="flex items-start gap-2 sm:gap-3">
    <div class="-mt-0.5 shrink-0" [ngClass]="variantClasses.icon" [innerHTML]="iconSvg | safeHtml"></div>

    <div class="min-w-0">
      <h4 class="mb-1 text-xs sm:text-sm font-semibold text-gray-800 dark:text-white/90">
        {{ title }}
      </h4>


      <p class="text-xs sm:text-sm text-gray-500 dark:text-gray-400">{{ message }}</p>

      @if (showLink) {
      <a
        [routerLink]="linkHref"
        class="inline-block mt-2 sm:mt-3 text-xs sm:text-sm font-medium text-gray-500 underline dark:text-gray-400"
      >
        {{ linkText }}
      </a>
      }
    </div>
  </div>
</div>
