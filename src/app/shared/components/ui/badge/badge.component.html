<span [ngClass]="baseStyles + ' ' + sizeClass + ' ' + colorStyles + ' inline-flex items-center'">
  @if (startIcon) {
  <span class="mr-0.5 sm:mr-1" [innerHTML]="startIcon | safeHtml"></span>
  }
  <ng-content></ng-content>
  @if (endIcon) {
  <span class="ml-0.5 sm:ml-1" [innerHTML]="endIcon"></span>
  }
</span>
