<div class="grid grid-cols-1 gap-2 sm:grid-cols-2 lg:grid-cols-5">
  @for (m of metrics; track m.label) {
    <div class="rounded-2xl border border-gray-200 bg-white p-3 sm:p-4 dark:border-gray-800 dark:bg-white/[0.03]">
      <div class="flex items-center justify-between">
        <div>
          <p class="font-semibold text-gray-800 text-[10px] sm:text-xs dark:text-white/90 mb-1">{{ m.label }}</p>
          <h3 class="text-base sm:text-lg font-semibold text-gray-800 dark:text-white/90">{{ m.value }}</h3>
          <span class="block text-[10px] sm:text-xs text-gray-500 dark:text-gray-400">{{ m.note }}</span>
        </div>
        <div class="flex items-center justify-center w-7 h-7 sm:w-8 sm:h-8 rounded-full dark:text-gray-400" [ngClass]="m.tone">
          <span [innerHTML]="iconSvg(m.icon)"></span>
        </div>
      </div>
    </div>
  }
</div>
